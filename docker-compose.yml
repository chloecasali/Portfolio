services:
  portfolio-dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  portfolio-prod:
    build:
      context: .
      target: prod
    ports:
      - "8080:80"

volumes:
  node_modules:
